services:
  - type: web
    name: dbt-telegram-bot
    runtime: python
    pythonVersion: "3.12.10"
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false        # вставить вручную после первого деплоя
      - key: PORT
        value: "10000"
